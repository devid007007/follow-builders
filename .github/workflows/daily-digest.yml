name: Daily AI Builders Digest

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  send-digest:
    runs-on: ubuntu-latest
    
    steps:
      - name: Fetch, translate and send digest
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          node -e "
          const https = require('https');
          
          const FEISHU_WEBHOOK = process.env.FEISHU_WEBHOOK;
          const GEMINI_API_KEY = process.env.GEMINI_API_KEY;
          
          if (!FEISHU_WEBHOOK) {
            console.error('错误: FEISHU_WEBHOOK 未设置');
            process.exit(1);
          }
          if (!GEMINI_API_KEY) {
            console.error('错误: GEMINI_API_KEY 未设置');
            process.exit(1);
          }
          
          const FEEDS = [
            { url: 'https://raw.githubusercontent.com/zarazhangrui/follow-builders/main/feed-x.json', name: 'X/Twitter', key: 'x' },
            { url: 'https://raw.githubusercontent.com/zarazhangrui/follow-builders/main/feed-blogs.json', name: '博客', key: 'blogs' },
            { url: 'https://raw.githubusercontent.com/zarazhangrui/follow-builders/main/feed-podcasts.json', name: '播客', key: 'podcasts' }
          ];
          
          // Gemini 翻译提示词（来自 prompts/translate.md）
          const TRANSLATE_PROMPT = \`You are translating an AI industry digest from English to Chinese.

## Instructions

- Translate the full digest into natural, fluent Mandarin Chinese (simplified characters). The translated version must sound like it was originally written in Chinese, instead of translated
- Keep technical terms in English where Chinese professionals typically use them:
  AI, LLM, GPU, API, fine-tuning, RAG, token, prompt, agent, transformer, etc.
- Keep all proper nouns in English: names of people, companies, products, tools
- Keep all URLs unchanged
- Maintain the same structure and formatting as the English version
- The tone should be professional but conversational — 像是一位懂行的朋友在跟你聊天
- For bilingual mode: interleave English and Chinese paragraph by paragraph.
  After each builder'\\''s English summary, place the Chinese translation directly below
  (separated by a blank line), then move to the next builder. Same for podcasts.
  Do NOT output all English first then all Chinese.
- Never use em-dashes

以下是今天的内容，请翻译：\`;
          
          function fetchJSON(url) {
            return new Promise((resolve) => {
              https.get(url, { timeout: 15000 }, (res) => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => {
                  try { resolve(JSON.parse(data)); } 
                  catch(e) { console.log('解析失败:', url); resolve(null); }
                });
              }).on('error', () => { console.log('请求失败:', url); resolve(null); });
            });
          }
          
          function callGemini(text) {
            return new Promise((resolve) => {
              const prompt = TRANSLATE_PROMPT + '\\n\\n' + text;
              const body = JSON.stringify({
                contents: [{ parts: [{ text: prompt }] }],
                generationConfig: { temperature: 0.3, maxOutputTokens: 8192 }
              });
              
              const options = {
                hostname: 'generativelanguage.googleapis.com',
                path: '/v1beta/models/gemini-2.0-flash:generateContent?key=' + GEMINI_API_KEY,
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'Content-Length': Buffer.byteLength(body)
                },
                timeout: 60000
              };
              
              const req = https.request(options, (res) => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => {
                  try {
                    const json = JSON.parse(data);
                    if (json.candidates && json.candidates[0] && json.candidates[0].content) {
                      resolve(json.candidates[0].content.parts[0].text);
                    } else if (json.error) {
                      console.log('Gemini API 错误:', json.error.message);
                      resolve(null);
                    } else {
                      resolve(null);
                    }
                  } catch(e) { resolve(null); }
                });
              });
              req.on('error', () => resolve(null));
              req.on('timeout', () => { console.log('Gemini 超时'); resolve(null); });
              req.write(body);
              req.end();
            });
          }
          
          function sendToFeishu(content) {
            return new Promise((resolve) => {
              const data = JSON.stringify({ msg_type: 'interactive', card: content });
              const url = new URL(FEISHU_WEBHOOK);
              const options = {
                hostname: url.hostname,
                path: url.pathname + url.search,
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'Content-Length': Buffer.byteLength(data)
                }
              };
              
              const req = https.request(options, (res) => {
                let body = '';
                res.on('data', chunk => body += chunk);
                res.on('end', () => {
                  console.log('飞书响应:', res.statusCode);
                  resolve(body);
                });
              });
              req.on('error', () => resolve(null));
              req.write(data);
              req.end();
            });
          }
          
          async function main() {
            try {
              console.log('开始获取 Feed...');
              const results = await Promise.all(FEEDS.map(f => fetchJSON(f.url)));
              
              const allItems = [];
              results.forEach((feed, index) => {
                if (!feed) return;
                const items = feed[FEEDS[index].key];
                if (!items || !Array.isArray(items)) return;
                console.log(FEEDS[index].name + ' 获取到 ' + items.length + ' 条');
                items.forEach(item => allItems.push({ ...item, _source: FEEDS[index].name }));
              });
              
              if (allItems.length === 0) {
                console.log('没有内容');
                return;
              }
              
              // 扁平化数据
              const flatItems = [];
              allItems.forEach(item => {
                if (item._source === 'X/Twitter' && item.tweets && Array.isArray(item.tweets)) {
                  item.tweets.forEach(t => {
                    flatItems.push({
                      title: item.name + ' (@' + item.handle + ')',
                      text: t.text,
                      url: t.url,
                      createdAt: t.createdAt,
                      likes: t.likes,
                      _source: 'X/Twitter'
                    });
                  });
                } else {
                  flatItems.push({
                    title: item.title || item.name || '无标题',
                    text: item.content || item.description || '',
                    url: item.url,
                    createdAt: item.publishedAt,
                    _source: item._source
                  });
                }
              });
              
              flatItems.sort((a, b) => {
                const tA = a.createdAt ? new Date(a.createdAt).getTime() : 0;
                const tB = b.createdAt ? new Date(b.createdAt).getTime() : 0;
                return tB - tA;
              });
              
              const items = flatItems.slice(0, 15);
              console.log('准备翻译 ' + items.length + ' 条内容...');
              
              // 构建待翻译的文本
              let digestText = 'AI Builders 每日简报\\\\n\\\\n';
              items.forEach((item, i) => {
                digestText += '[' + (i+1) + '] ' + item.title + '\\\\n';
                digestText += '来源: ' + item._source + '\\\\n';
                if (item.text) digestText += item.text + '\\\\n';
                if (item.url) digestText += '链接: ' + item.url + '\\\\n';
                digestText += '\\\\n';
              });
              
              // 调用 Gemini 翻译
              console.log('正在调用 Gemini 翻译...');
              const translated = await callGemini(digestText);
              
              if (!translated) {
                console.log('翻译失败，将使用原文推送');
              }
              
              // 构建飞书消息
              const displayText = translated || digestText;
              // 分段显示（飞书卡片有长度限制，超过 8000 字符用 text 模式）
              const isLong = displayText.length > 7000;
              
              let message;
              if (isLong) {
                // 长文本用 text 模式
                message = {
                  msg_type: 'text',
                  content: {
                    text: displayText.substring(0, 7999)
                  }
                };
              } else {
                // 短文本用卡片模式
                const elements = [{
                  tag: 'div',
                  text: {
                    tag: 'lark_md',
                    content: displayText.replace(/\\\\n/g, '\\\\n').replace(/\\[/g, '\\\\[').replace(/\\]/g, '\\\\]')
                  }
                }, {
                  tag: 'hr'
                }, {
                  tag: 'div',
                  text: {
                    tag: 'lark_md',
                    content: '_⏰ ' + new Date().toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai' }) + ' · 共 ' + flatItems.length + ' 条更新_'
                  }
                }];
                
                message = {
                  msg_type: 'interactive',
                  card: {
                    config: { wide_screen_mode: true },
                    header: {
                      title: { tag: 'plain_text', content: 'AI Builders 中文简报' },
                      template: 'blue'
                    },
                    elements: elements
                  }
                };
              }
              
              console.log('推送到飞书...');
              const result = await sendToFeishu(message);
              console.log('完成');
              
            } catch (error) {
              console.error('错误:', error.message);
              process.exit(1);
            }
          }
          
          main();
          "
