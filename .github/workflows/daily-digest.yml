name: Daily AI Builders Digest

on:
  schedule:
    - cron: '0 1 * * *'  # 每天北京时间 9 点
  workflow_dispatch:  # 支持手动触发

jobs:
  send-digest:
    runs-on: ubuntu-latest
    
    steps:
      - name: Fetch and send digest
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: |
          node -e "
          const https = require('https');
          
          const FEISHU_WEBHOOK = process.env.FEISHU_WEBHOOK;
          
          if (!FEISHU_WEBHOOK) {
            console.error('错误: FEISHU_WEBHOOK 未设置');
            process.exit(1);
          }
          
          // Feed URLs
          const FEEDS = [
            { 
              url: 'https://raw.githubusercontent.com/zarazhangrui/follow-builders/main/feed-x.json', 
              name: 'X/Twitter',
              key: 'x'  // 数据在 .x 属性里
            },
            { 
              url: 'https://raw.githubusercontent.com/zarazhangrui/follow-builders/main/feed-blogs.json', 
              name: '博客',
              key: 'blogs'  // 数据在 .blogs 属性里
            },
            { 
              url: 'https://raw.githubusercontent.com/zarazhangrui/follow-builders/main/feed-podcasts.json', 
              name: '播客',
              key: 'podcasts'  // 数据在 .podcasts 属性里
            }
          ];
          
          function fetchJSON(url) {
            return new Promise((resolve, reject) => {
              https.get(url, { timeout: 15000 }, (res) => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => {
                  try { 
                    const json = JSON.parse(data);
                    console.log('获取成功:', url, '类型:', typeof json, 'keys:', Object.keys(json).join(','));
                    resolve(json); 
                  } catch(e) { 
                    console.log('解析失败:', url, e.message);
                    resolve(null); 
                  }
                });
              }).on('error', (err) => {
                console.log('请求失败:', url, err.message);
                resolve(null);
              });
            });
          }
          
          function sendToFeishu(content) {
            return new Promise((resolve, reject) => {
              const data = JSON.stringify({ msg_type: 'interactive', card: content });
              const url = new URL(FEISHU_WEBHOOK);
              const options = {
                hostname: url.hostname,
                path: url.pathname + url.search,
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'Content-Length': Buffer.byteLength(data)
                }
              };
              
              const req = https.request(options, (res) => {
                let body = '';
                res.on('data', chunk => body += chunk);
                res.on('end', () => {
                  console.log('飞书响应:', res.statusCode, body);
                  resolve(body);
                });
              });
              req.on('error', reject);
              req.write(data);
              req.end();
            });
          }
          
          async function main() {
            try {
              console.log('开始获取 Feed 数据...');
              
              // 并行获取所有 Feed
              const results = await Promise.all(FEEDS.map(f => fetchJSON(f.url)));
              
              const allItems = [];
              
              results.forEach((feed, index) => {
                if (!feed) {
                  console.log(FEEDS[index].name + ' 获取失败');
                  return;
                }
                
                const key = FEEDS[index].key;
                const items = feed[key];
                
                if (!items || !Array.isArray(items)) {
                  console.log(FEEDS[index].name + ' 没有找到 ' + key + ' 数组');
                  return;
                }
                
                console.log(FEEDS[index].name + ' 获取到 ' + items.length + ' 条');
                
                items.forEach(item => {
                  allItems.push({
                    ...item,
                    _source: FEEDS[index].name
                  });
                });
              });
              
              console.log('总计获取到 ' + allItems.length + ' 条内容');
              
              if (allItems.length === 0) {
                console.log('没有获取到任何内容，跳过推送');
                return;
              }
              
              // 扁平化推文数据（X 的 tweets 是嵌套的）
              const flatItems = [];
              allItems.forEach(item => {
                if (item._source === 'X/Twitter' && item.tweets && Array.isArray(item.tweets)) {
                  item.tweets.forEach(tweet => {
                    flatItems.push({
                      title: item.name + ' (@' + item.handle + ')',
                      text: tweet.text,
                      url: tweet.url,
                      createdAt: tweet.createdAt,
                      likes: tweet.likes,
                      _source: 'X/Twitter'
                    });
                  });
                } else {
                  // 博客和播客直接添加
                  flatItems.push({
                    title: item.title || item.name || '无标题',
                    text: item.content || item.description || '',
                    url: item.url,
                    createdAt: item.publishedAt,
                    _source: item._source
                  });
                }
              });
              
              console.log('扁平化后共 ' + flatItems.length + ' 条');
              
              // 按时间排序
              flatItems.sort((a, b) => {
                const tA = a.createdAt ? new Date(a.createdAt).getTime() : 0;
                const tB = b.createdAt ? new Date(b.createdAt).getTime() : 0;
                return tB - tA;
              });
              
              // 取最新的 20 条
              const items = flatItems.slice(0, 20);
              
              // 构建飞书卡片
              const elements = [];
              
              // 标题
              elements.push({
                tag: 'div',
                text: {
                  tag: 'lark_md',
                  content: '**🤖 AI Builders 每日简报**'
                }
              });
              
              elements.push({ tag: 'hr' });
              
              // 内容列表
              items.forEach((item, index) => {
                const title = item.title || '无标题';
                const url = item.url || '';
                const source = item._source || '未知来源';
                const text = item.text || '';
                const truncatedText = text.length > 200 ? text.substring(0, 200) + '...' : text;
                const likes = item.likes ? ' ❤️ ' + item.likes : '';
                
                let contentText = \`**\${index + 1}. \${title}**\`;
                contentText += \`\\n📌 \${source}\${likes}\`;
                if (truncatedText) contentText += \`\\n📝 \${truncatedText}\`;
                if (url) contentText += \`\\n🔗 [查看原文](\${url})\`;
                
                elements.push({
                  tag: 'div',
                  text: {
                    tag: 'lark_md',
                    content: contentText
                  }
                });
                
                if (index < items.length - 1) {
                  elements.push({ tag: 'hr' });
                }
              });
              
              // 底部
              elements.push({ tag: 'hr' });
              elements.push({
                tag: 'div',
                text: {
                  tag: 'lark_md',
                  content: \`_⏰ \${new Date().toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai' })} · 共 \${flatItems.length} 条更新_\`
                }
              });
              
              const card = {
                config: { wide_screen_mode: true },
                header: {
                  title: {
                    tag: 'plain_text',
                    content: 'AI Builders Digest'
                  },
                  template: 'blue'
                },
                elements: elements
              };
              
              console.log('正在推送到飞书...');
              const result = await sendToFeishu(card);
              console.log('推送完成');
              
            } catch (error) {
              console.error('运行错误:', error.message);
              process.exit(1);
            }
          }
          
          main();
          "
