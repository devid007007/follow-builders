name: Daily AI Builders Digest

on:
  schedule:
    - cron: '0 1 * * *'  # 每天北京时间 9 点
  workflow_dispatch:  # 支持手动触发

jobs:
  send-digest:
    runs-on: ubuntu-latest
    
    steps:
      - name: Fetch and send digest
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: |
          node -e "
          const https = require('https');
          
          const FEISHU_WEBHOOK = process.env.FEISHU_WEBHOOK;
          
          if (!FEISHU_WEBHOOK) {
            console.error('错误: FEISHU_WEBHOOK 未设置');
            process.exit(1);
          }
          
          // Feed URLs（直接从仓库获取）
          const FEEDS = [
            { url: 'https://raw.githubusercontent.com/zarazhangrui/follow-builders/main/feed-x.json', name: 'X/Twitter' },
            { url: 'https://raw.githubusercontent.com/zarazhangrui/follow-builders/main/feed-blogs.json', name: '博客' },
            { url: 'https://raw.githubusercontent.com/zarazhangrui/follow-builders/main/feed-podcasts.json', name: '播客' }
          ];
          
          function fetchJSON(url) {
            return new Promise((resolve, reject) => {
              https.get(url, { timeout: 15000 }, (res) => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => {
                  try { 
                    const json = JSON.parse(data);
                    resolve(json); 
                  } catch(e) { 
                    console.log('解析失败:', url, e.message);
                    resolve(null); 
                  }
                });
              }).on('error', (err) => {
                console.log('请求失败:', url, err.message);
                resolve(null);
              }).on('timeout', () => {
                console.log('请求超时:', url);
                resolve(null);
              });
            });
          }
          
          function sendToFeishu(content) {
            return new Promise((resolve, reject) => {
              const data = JSON.stringify({ msg_type: 'interactive', card: content });
              const url = new URL(FEISHU_WEBHOOK);
              const options = {
                hostname: url.hostname,
                path: url.pathname + url.search,
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'Content-Length': Buffer.byteLength(data)
                },
                timeout: 15000
              };
              
              const req = https.request(options, (res) => {
                let body = '';
                res.on('data', chunk => body += chunk);
                res.on('end', () => {
                  console.log('飞书响应:', res.statusCode, body);
                  resolve(body);
                });
              });
              req.on('error', reject);
              req.on('timeout', () => reject(new Error('飞书请求超时')));
              req.write(data);
              req.end();
            });
          }
          
          async function main() {
            try {
              console.log('开始获取 Feed 数据...');
              
              // 并行获取所有 Feed
              const results = await Promise.all(FEEDS.map(f => fetchJSON(f.url)));
              
              const allItems = [];
              results.forEach((feed, index) => {
                if (feed && Array.isArray(feed)) {
                  console.log(FEEDS[index].name + ' 获取到 ' + feed.length + ' 条');
                  feed.forEach(item => {
                    allItems.push({
                      ...item,
                      _source: FEEDS[index].name
                    });
                  });
                } else {
                  console.log(FEEDS[index].name + ' 获取失败或为空');
                }
              });
              
              console.log('总计获取到 ' + allItems.length + ' 条内容');
              
              if (allItems.length === 0) {
                console.log('没有获取到任何内容，跳过推送');
                return;
              }
              
              // 按时间排序（如果有 published 字段）
              allItems.sort((a, b) => {
                const tA = a.published ? new Date(a.published).getTime() : 0;
                const tB = b.published ? new Date(b.published).getTime() : 0;
                return tB - tA;
              });
              
              // 取最新的 15 条
              const items = allItems.slice(0, 15);
              
              // 构建飞书卡片
              const elements = [];
              
              // 标题
              elements.push({
                tag: 'div',
                text: {
                  tag: 'lark_md',
                  content: '**🤖 AI Builders 每日简报**'
                }
              });
              
              elements.push({ tag: 'hr' });
              
              // 内容列表
              items.forEach((item, index) => {
                const title = item.title || '无标题';
                const url = item.url || item.link || '';
                const source = item._source || '未知来源';
                const author = item.author || item.creator || '';
                const summary = item.summary || item.description || item.content || '';
                const truncatedSummary = summary.length > 150 ? summary.substring(0, 150) + '...' : summary;
                
                let contentText = \`**\${index + 1}. \${title}**\`;
                if (author) contentText += \`\\n👤 \${author}\`;
                contentText += \`\\n📌 \${source}\`;
                if (truncatedSummary) contentText += \`\\n📝 \${truncatedSummary}\`;
                if (url) contentText += \`\\n🔗 [查看原文](\${url})\`;
                
                elements.push({
                  tag: 'div',
                  text: {
                    tag: 'lark_md',
                    content: contentText
                  }
                });
                
                if (index < items.length - 1) {
                  elements.push({ tag: 'hr' });
                }
              });
              
              // 底部
              elements.push({ tag: 'hr' });
              elements.push({
                tag: 'div',
                text: {
                  tag: 'lark_md',
                  content: \`_⏰ \${new Date().toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai' })} · 共 \${allItems.length} 条更新_\`
                }
              });
              
              const card = {
                config: { wide_screen_mode: true },
                header: {
                  title: {
                    tag: 'plain_text',
                    content: 'AI Builders Digest'
                  },
                  template: 'blue'
                },
                elements: elements
              };
              
              console.log('正在推送到飞书...');
              const result = await sendToFeishu(card);
              console.log('推送完成');
              
            } catch (error) {
              console.error('运行错误:', error.message);
              process.exit(1);
            }
          }
          
          main();
          "
